name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

      - name: Test (pytest)
        run: pytest -q

      # Demonstrate the compliance gate: a breaching book must exit non-zero,
      # and a compliant book must exit zero.
      - name: Compliance gate blocks a breach
        run: |
          if compliance-check check -p examples/portfolio.csv -g examples/guidelines.yaml; then
            echo "::error::expected a guideline breach to fail the gate"
            exit 1
          fi
          echo "gate correctly blocked on breach"

      - name: Compliance gate passes a compliant book
        run: compliance-check check -p examples/portfolio_prior.csv -g examples/guidelines.yaml
